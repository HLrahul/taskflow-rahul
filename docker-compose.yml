services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: on-failure
    container_name: taskflow-api
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=taskflow
      - DB_HOST=postgres
      - DB_PORT=5432
      - JWT_SECRET=supersecret123
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    container_name: taskflow-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-taskflow}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
